{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — NutriPlanner Clinical</title>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        /* ================================================
           TEAL CLINICAL LOGIN — Palette:
           #A4D8E1 · #B2E0E6 · #C4F1F4 · #E0F7FA · #E8F9FD
        ================================================ */
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #061419 0%, #0d3d46 55%, #082830 100%);
            height: 100vh;
            display: flex; align-items: center; justify-content: center;
            overflow: hidden; position: relative;
        }

        /* ── Animated background orbs ── */
        .bg-gradient {
            position: absolute; width: 100%; height: 100%;
            background:
                radial-gradient(circle at 20% 30%, rgba(58,172,190,0.20) 0%, transparent 50%),
                radial-gradient(circle at 80% 70%, rgba(164,216,225,0.14) 0%, transparent 50%),
                radial-gradient(circle at 55% 50%, rgba(196,241,244,0.06) 0%, transparent 65%);
            animation: gradientShift 14s ease infinite;
        }

        @keyframes gradientShift {
            0%, 100% { opacity: 1; transform: scale(1); }
            50%       { opacity: 0.75; transform: scale(1.08); }
        }

        /* ── Subtle grid ── */
        .medical-pattern {
            position: absolute; width: 100%; height: 100%; opacity: 0.04;
            background-image:
                repeating-linear-gradient(0deg, transparent, transparent 50px, rgba(164,216,225,0.1) 50px, rgba(164,216,225,0.1) 51px),
                repeating-linear-gradient(90deg, transparent, transparent 50px, rgba(164,216,225,0.1) 50px, rgba(164,216,225,0.1) 51px);
        }

        /* ── Floating teal particles ── */
        .particle {
            position: absolute;
            background: rgba(164, 216, 225, 0.12);
            border-radius: 50%;
            animation: float linear infinite;
            pointer-events: none;
        }

        @keyframes float {
            0%   { transform: translateY(100vh) rotate(0deg); opacity: 0; }
            10%  { opacity: 1; }
            90%  { opacity: 1; }
            100% { transform: translateY(-100px) rotate(360deg); opacity: 0; }
        }

        /* ── Floating medical icons ── */
        .floating-icon {
            position: absolute;
            color: rgba(164, 216, 225, 0.08);
            font-size: 40px;
            animation: floatIcon 20s ease-in-out infinite;
            pointer-events: none;
        }

        @keyframes floatIcon {
            0%, 100% { transform: translate(0, 0) rotate(0deg); }
            25%       { transform: translate(30px, -30px) rotate(90deg); }
            50%       { transform: translate(0, -60px) rotate(180deg); }
            75%       { transform: translate(-30px, -30px) rotate(270deg); }
        }

        /* ── Login card ── */
        .login-container {
            position: relative; z-index: 10;
            width: 100%; max-width: 480px; padding: 20px;
        }

        .login-card {
            background: rgba(255, 255, 255, 0.97);
            backdrop-filter: blur(24px);
            border: 1px solid rgba(196, 241, 244, 0.7);
            border-radius: 32px;
            padding: 60px 50px;
            box-shadow:
                0 24px 64px rgba(0, 0, 0, 0.40),
                0 0 0 1px rgba(58, 172, 190, 0.15),
                0 0 80px rgba(58, 172, 190, 0.14),
                inset 0 1px 0 rgba(255, 255, 255, 0.9);
            position: relative; overflow: hidden;
            animation: slideUp 0.8s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes slideUp {
            from { transform: translateY(60px) scale(0.95); opacity: 0; }
            to   { transform: translateY(0) scale(1); opacity: 1; }
        }

        /* Teal accent stripe at top */
        .accent-line {
            position: absolute; top: 0; left: 0; right: 0; height: 4px;
            background: linear-gradient(90deg, #A4D8E1, #3AACBE, #2990A0, #C4F1F4, #A4D8E1);
            background-size: 300% 100%;
            animation: shimmer 4s linear infinite;
        }

        @keyframes shimmer {
            0%   { background-position: 0% 50%; }
            100% { background-position: 300% 50%; }
        }

        /* Decorative circles */
        .deco-circle {
            position: absolute; border-radius: 50%;
            background: linear-gradient(135deg, rgba(58,172,190,0.12), rgba(164,216,225,0.06));
            pointer-events: none;
        }
        .deco-circle-1 { width: 200px; height: 200px; top: -100px; right: -100px; animation: rotate 22s linear infinite; }
        .deco-circle-2 { width: 150px; height: 150px; bottom: -75px; left: -75px; animation: rotate 16s linear infinite reverse; }

        @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        /* ── Brand section ── */
        .brand-section { text-align: center; margin-bottom: 40px; }

        .brand-logo {
            width: 90px; height: 90px;
            background: linear-gradient(135deg, #3AACBE 0%, #A4D8E1 100%);
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            margin: 0 auto 24px;
            box-shadow: 0 10px 30px rgba(58,172,190,0.45), 0 0 0 10px rgba(58,172,190,0.10);
            animation: pulse 3s ease-in-out infinite;
        }

        @keyframes pulse {
            0%,100% { transform: scale(1); box-shadow: 0 10px 30px rgba(58,172,190,0.4), 0 0 0 10px rgba(58,172,190,0.10); }
            50%      { transform: scale(1.05); box-shadow: 0 16px 42px rgba(58,172,190,0.55), 0 0 0 16px rgba(58,172,190,0.14); }
        }

        .brand-logo i { color: white; font-size: 40px; animation: heartbeat 1.8s ease-in-out infinite; }

        @keyframes heartbeat {
            0%,100% { transform: scale(1); }
            10%      { transform: scale(1.12); }
            20%      { transform: scale(1); }
            30%      { transform: scale(1.08); }
            40%      { transform: scale(1); }
        }

        h2 { color: #0d3d46; font-size: 32px; font-weight: 800; margin-bottom: 8px; letter-spacing: -0.5px; }
        .subtitle { color: #5a9aaa; font-size: 15px; font-weight: 400; }

        /* ── Form ── */
        .login-form { margin-top: 40px; }
        .input-group { margin-bottom: 24px; text-align: left; }

        .input-group label {
            display: block; font-size: 12px; font-weight: 700;
            color: #2d6e7a; margin-bottom: 10px;
            text-transform: uppercase; letter-spacing: 0.7px;
        }

        .input-wrapper { position: relative; }

        .input-wrapper i {
            position: absolute; left: 18px; top: 50%;
            transform: translateY(-50%);
            color: #A4D8E1; font-size: 17px;
            transition: all 0.3s ease; z-index: 1;
        }

        input {
            width: 100%; padding: 16px 18px 16px 52px;
            border: 2px solid #C4F1F4;
            border-radius: 14px; font-size: 15px;
            background: #F0FCFD; color: #0d3d46;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            font-family: 'Inter', sans-serif; font-weight: 500;
        }

        input::placeholder { color: #B2E0E6; }

        input:focus {
            border-color: #3AACBE; background: #fff; outline: none;
            box-shadow: 0 0 0 4px rgba(58,172,190,0.15), 0 4px 14px rgba(58,172,190,0.15);
            transform: translateY(-2px);
        }

        .input-wrapper:focus-within i { color: #3AACBE; transform: translateY(-50%) scale(1.1); }

        /* ── Submit button ── */
        .submit-btn {
            width: 100%; padding: 18px;
            background: linear-gradient(135deg, #3AACBE 0%, #2990A0 100%);
            color: white; border: none; border-radius: 14px;
            font-size: 16px; font-weight: 700; cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            margin-top: 10px; font-family: 'Inter', sans-serif;
            text-transform: uppercase; letter-spacing: 0.6px;
            box-shadow: 0 10px 25px rgba(58,172,190,0.45);
            position: relative; overflow: hidden;
        }

        .submit-btn::before {
            content: ''; position: absolute; top: 0; left: -100%;
            width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.28), transparent);
            transition: left 0.5s;
        }

        .submit-btn:hover::before { left: 100%; }

        .submit-btn:hover {
            background: linear-gradient(135deg, #2990A0 0%, #1a7080 100%);
            transform: translateY(-3px);
            box-shadow: 0 16px 36px rgba(58,172,190,0.55);
        }

        .submit-btn:active { transform: translateY(-1px); }
        .submit-btn i { margin-left: 10px; transition: transform 0.3s ease; }
        .submit-btn:hover i { transform: translateX(5px); }

        /* ── Error state ── */
        .error-message {
            background: linear-gradient(135deg, #fee2e2 0%, #fecaca 100%);
            color: #dc2626; padding: 16px; border-radius: 12px;
            font-size: 14px; margin-bottom: 24px;
            display: flex; align-items: center; justify-content: center; gap: 10px;
            font-weight: 600; border: 1px solid #fca5a5; animation: shake 0.5s ease;
        }

        @keyframes shake {
            0%,100% { transform: translateX(0); }
            25%      { transform: translateX(-10px); }
            75%      { transform: translateX(10px); }
        }

        /* ── Footer ── */
        .footer-text {
            margin-top: 32px; text-align: center; font-size: 12px;
            color: #7ABFCC; font-weight: 500; letter-spacing: 0.5px;
            display: flex; align-items: center; justify-content: center; gap: 8px;
        }

        .footer-text i { color: #3AACBE; font-size: 14px; }

        @media (max-width: 640px) {
            .login-card { padding: 40px 28px; border-radius: 24px; }
            h2 { font-size: 26px; }
            .brand-logo { width: 72px; height: 72px; }
            .brand-logo i { font-size: 30px; }
        }
    </style>
</head>

<body>

    <!-- Background layers -->
    <div class="bg-gradient"></div>
    <div class="medical-pattern"></div>

    <!-- Floating medical icons -->
    <i class="fas fa-heartbeat floating-icon" style="top:10%;left:15%;animation-delay:0s;"></i>
    <i class="fas fa-user-md floating-icon" style="top:70%;left:10%;animation-delay:5s;"></i>
    <i class="fas fa-stethoscope floating-icon" style="top:20%;right:20%;animation-delay:10s;"></i>
    <i class="fas fa-leaf floating-icon" style="bottom:20%;right:15%;animation-delay:15s;"></i>

    <!-- Login card -->
    <div class="login-container">
        <div class="login-card">
            <div class="accent-line"></div>
            <div class="deco-circle deco-circle-1"></div>
            <div class="deco-circle deco-circle-2"></div>

            <!-- Brand -->
            <div class="brand-section">
                <div class="brand-logo">
                    <i class="fas fa-heartbeat"></i>
                </div>
                <h2>Welcome Back</h2>
                <p class="subtitle">Sign in to your NutriPlanner dashboard</p>
            </div>

            <!-- Error -->
            {% if form.errors %}
            <div class="error-message">
                <i class="fas fa-exclamation-circle"></i>
                <span>Invalid username or password</span>
            </div>
            {% endif %}

            <!-- Form -->
            <form method="post" class="login-form">
                {% csrf_token %}

                <div class="input-group">
                    <label>Username</label>
                    <div class="input-wrapper">
                        <input type="text" name="username" placeholder="Enter your doctor ID" required autofocus>
                        <i class="fas fa-user-md"></i>
                    </div>
                </div>

                <div class="input-group">
                    <label>Password</label>
                    <div class="input-wrapper">
                        <input type="password" name="password" placeholder="Enter your password" required>
                        <i class="fas fa-lock"></i>
                    </div>
                </div>

                <button type="submit" class="submit-btn">
                    Sign In <i class="fas fa-arrow-right"></i>
                </button>
            </form>

            <!-- Footer -->
            <div class="footer-text">
                <i class="fas fa-shield-alt"></i>
                <span>Restricted Access &bull; Authorized Personnel Only</span>
            </div>
        </div>
    </div>

    <script>
        // Floating teal particles
        for (let i = 0; i < 15; i++) {
            const p = document.createElement('div');
            p.className = 'particle';
            const s = Math.random() * 6 + 3;
            p.style.cssText = `width:${s}px;height:${s}px;left:${Math.random()*100}%;animation-duration:${Math.random()*10+15}s;animation-delay:${Math.random()*5}s`;
            document.body.appendChild(p);
        }

        // Prevent double submit
        document.querySelector('.login-form')?.addEventListener('submit', function(e) {
            const btn = this.querySelector('.submit-btn');
            if (btn?.disabled) { e.preventDefault(); return; }
            if (btn) {
                btn.disabled = true;
                btn.style.opacity = '0.75';
                btn.style.cursor = 'not-allowed';
                btn.innerHTML = 'Signing In... <i class="fas fa-spinner fa-spin"></i>';
            }
        });
    </script>

</body>
</html>
