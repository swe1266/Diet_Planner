{% extends 'base.html' %}
{% load static %}

{% block content %}
<style>
    :root, [data-theme="light"] {
        --grad-primary: linear-gradient(135deg, #4318FF 0%, #868CFF 100%);
        --shadow-soft:  0px 18px 40px rgba(112, 144, 176, 0.12);
        --radius-lg: 24px;
        --radius-md: 16px;
        --radius-sm: 12px;
    }
    [data-theme="dark"] {
        --shadow-soft: 0px 18px 40px rgba(0,0,0,0.4);
    }

    .registration-wrapper {
        max-width: 900px;
        margin: 0 auto;
        padding-bottom: 50px;
        animation: fadeIn .6s ease-out;
    }

    @keyframes fadeIn {
        from {
            opacity: 0;
            transform: translateY(20px);
        }

        to {
            opacity: 1;
            transform: translateY(0);
        }
    }

    .back-nav {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        color: var(--brand);
        text-decoration: none;
        font-weight: 700;
        font-size: 13px;
        margin-bottom: 24px;
        padding: 9px 18px;
        background: var(--brand-light);
        border-radius: var(--radius-sm);
        transition: all .3s ease;
    }

    .back-nav:hover {
        background: var(--brand);
        color: white;
        transform: translateX(-4px);
        box-shadow: 0 6px 20px rgba(67, 24, 255, .25);
    }

    .form-header {
        background: var(--grad-primary);
        color: white;
        border-radius: var(--radius-lg) var(--radius-lg) 0 0;
        padding: 44px 48px;
        text-align: center;
        position: relative;
        overflow: hidden;
        box-shadow: 0 20px 40px rgba(67, 24, 255, .25);
    }

    .form-header::before {
        content: '';
        position: absolute;
        top: -40%;
        right: -8%;
        width: 350px;
        height: 350px;
        background: radial-gradient(circle, rgba(255, 255, 255, .13) 0%, transparent 60%);
        border-radius: 50%;
        animation: pulseGlow 5s ease-in-out infinite alternate;
    }

    .form-header::after {
        content: '+';
        position: absolute;
        top: -10px;
        right: 5%;
        font-size: 160px;
        color: rgba(255, 255, 255, .05);
        font-weight: 100;
        animation: rotateCross 20s linear infinite;
        line-height: 1;
    }

    @keyframes rotateCross {
        from {
            transform: rotate(0deg);
        }

        to {
            transform: rotate(360deg);
        }
    }

    @keyframes pulseGlow {
        from {
            transform: scale(1);
            opacity: .8;
        }

        to {
            transform: scale(1.1);
            opacity: 1;
        }
    }

    .form-header h2 {
        font-size: 32px;
        font-weight: 800;
        margin-bottom: 10px;
        letter-spacing: -.5px;
        position: relative;
        z-index: 2;
    }

    .form-header p {
        opacity: .88;
        font-weight: 400;
        font-size: 15px;
        position: relative;
        z-index: 2;
        margin: 0;
    }

    .form-container {
        background: var(--bg-surface);
        padding: 50px;
        border-radius: 0 0 var(--radius-lg) var(--radius-lg);
        box-shadow: var(--shadow-soft);
        border: var(--border);
        border-top: none;
    }

    .form-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 24px;
    }

    .form-group {
        margin-bottom: 5px;
    }

    .form-group.full-width {
        grid-column: span 2;
    }

    .label-container {
        display: flex;
        align-items: center;
        gap: 8px;
        margin-bottom: 9px;
    }

    .label-container i {
        color: var(--brand);
        font-size: 14px;
    }

    label {
        font-size: 12px;
        font-weight: 700;
        color: #475569;
        text-transform: uppercase;
        letter-spacing: .6px;
    }

    .input-wrapper {
        position: relative;
    }

    .input-wrapper i {
        position: absolute;
        left: 15px;
        top: 50%;
        transform: translateY(-50%);
        color: var(--text-muted);
        font-size: 16px;
        pointer-events: none;
        transition: color .3s;
    }

    input,
    select,
    textarea {
        width: 100%;
        padding: 14px 15px 14px 45px;
        border: 1.5px solid var(--border);
        border-radius: var(--radius-sm);
        font-size: 15px;
        background: var(--bg-body);
        color: var(--text-body);
        transition: all .3s cubic-bezier(.4, 0, .2, 1);
        font-family: inherit;
        box-sizing: border-box;
        outline: none;
    }

    .required-dot {
        color: #ef4444;
        margin-left: 2px;
        font-weight: 1000;
    }

    textarea {
        padding-left: 15px;
    }

    input:focus,
    select:focus,
    textarea:focus {
        border-color: var(--brand);
        background: var(--bg-surface);
        box-shadow: 0 0 0 4px rgba(67, 24, 255, .1);
        transform: translateY(-1px);
    }

    .submit-button {
        width: 100%;
        padding: 18px;
        background: var(--grad-primary);
        color: white;
        border: none;
        border-radius: var(--radius-md);
        font-size: 17px;
        font-weight: 700;
        cursor: pointer;
        transition: all .3s ease;
        margin-top: 30px;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 12px;
        box-shadow: 0 10px 30px rgba(67, 24, 255, .25);
        font-family: inherit;
    }

    .submit-button:hover {
        transform: translateY(-3px);
        box-shadow: 0 18px 40px rgba(67, 24, 255, .38);
    }

    /* Disease Tag Input */
    #diseaseTagBox {
        min-height: 56px;
        background: var(--bg-body);
        border: 1.5px solid var(--border);
        border-radius: var(--radius-sm);
        padding: 10px 14px;
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        align-items: center;
        cursor: text;
        transition: border-color .2s, box-shadow .2s;
    }

    #diseaseTagBox:focus-within {
        border-color: var(--brand);
        box-shadow: 0 0 0 4px rgba(67, 24, 255, .1);
    }

    #diseaseSearch {
        border: none;
        outline: none;
        background: transparent;
        font-size: 14px;
        font-family: inherit;
        min-width: 220px;
        flex: 1;
        color: var(--text-body);
    }

    #diseaseSearch::placeholder {
        color: var(--text-muted);
    }

    .dtag {
        display: inline-flex;
        align-items: center;
        gap: 5px;
        background: var(--grad-primary);
        color: #fff;
        border-radius: 999px;
        padding: 5px 14px 5px 12px;
        font-size: 13px;
        font-weight: 600;
        white-space: nowrap;
        animation: tagPop .18s cubic-bezier(.175, .885, .32, 1.275) both;
    }

    @keyframes tagPop {
        from {
            transform: scale(.7);
            opacity: 0;
        }

        to {
            transform: scale(1);
            opacity: 1;
        }
    }

    .dtag-remove {
        background: rgba(255, 255, 255, .25);
        border: none;
        color: #fff;
        width: 18px;
        height: 18px;
        border-radius: 50%;
        font-size: 13px;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
        transition: background .15s;
        padding: 0;
        font-family: inherit;
    }

    .dtag-remove:hover {
        background: rgba(255, 255, 255, .45);
    }

    #diseaseDrop {
        position: fixed;
        z-index: 99999;
        background: var(--bg-surface);
        border: 1.5px solid var(--border);
        border-radius: var(--radius-sm);
        max-height: 240px;
        overflow-y: auto;
        box-shadow: 0 12px 36px rgba(0, 0, 0, .24);
        display: none;
        font-size: 14px;
        scrollbar-width: thin;
    }

    .dsug-item {
        padding: 11px 18px;
        cursor: pointer;
        transition: background .12s;
        border-bottom: 1px solid var(--border);
        color: var(--text-body);
    }

    .dsug-item:last-child {
        border-bottom: none;
    }

    .dsug-item:hover,
    .dsug-item.active {
        background: var(--brand-light);
        color: var(--brand);
        font-weight: 600;
    }

    .dsug-item mark {
        background: rgba(67, 24, 255, .12);
        color: var(--brand);
        border-radius: 3px;
        padding: 0 2px;
        font-weight: 700;
    }

    .dsug-empty {
        padding: 14px 18px;
        color: var(--text-muted);
        font-style: italic;
        text-align: center;
    }

    @media (max-width: 768px) {
        .form-grid {
            grid-template-columns: 1fr;
        }

        .form-group.full-width {
            grid-column: span 1;
        }

        .form-container {
            padding: 28px 20px;
        }

        .form-header {
            padding: 32px 20px;
        }
    }
</style>

<div class="registration-wrapper">
    <a href="{% url 'home' %}" class="back-nav">
        <i class="fas fa-arrow-left"></i>
        <span>Back to Dashboard</span>
    </a>

    <div class="form-header">
        <h2>🏥 Patient Registration</h2>
        <p>Complete the clinical profile to generate a precision diet plan</p>
    </div>

    <div class="form-container">
        <form method="post">
            {% csrf_token %}
            <div class="form-grid">
                <div class="form-group">
                    <div class="label-container"><i class="fas fa-user"></i><label>Patient Full Name <span class="required-dot">*</span></label></div>
                    <div class="input-wrapper">
                        <input type="text" name="name" placeholder="Enter Patient Full Name" required>
                        <i class="fas fa-id-card"></i>
                    </div>
                </div>
                <div class="form-group">
                    <div class="label-container"><i class="fas fa-phone"></i><label>Contact Number <span class="required-dot">*</span></label></div>
                    <div class="input-wrapper">
                        <input type="tel" name="phone" id="phoneInput" pattern="[0-9]{10}" placeholder="Enter Contact Number" required>
                        <i class="fas fa-mobile-alt"></i>
                    </div>
                </div>
                <div class="form-group">
                    <div class="label-container"><i class="fas fa-birthday-cake"></i><label>Patient Age <span class="required-dot">*</span></label></div>
                    <div class="input-wrapper">
                        <input type="number" name="age" placeholder="Age in years" required>
                        <i class="fas fa-calendar-alt"></i>
                    </div>
                </div>
                <div class="form-group">
                    <div class="label-container"><i class="fas fa-venus-mars"></i><label>Gender <span class="required-dot">*</span></label></div>
                    <div class="input-wrapper">
                        <select name="gender" required>
                            <option value="">Select Gender</option>
                            <option value="Male">Male</option>
                            <option value="Female">Female</option>
                            <option value="Other">Other</option>
                        </select>
                        <i class="fas fa-caret-down"></i>
                    </div>
                </div>
                <div class="form-group full-width">
                    <div class="label-container"><i class="fas fa-map-marker-alt"></i><label>Residential Address <span class="required-dot">*</span></label>
                    </div>
                    <textarea name="address" rows="2" placeholder="Enter Residential Address" required></textarea>
                </div>
                <div class="form-group">
                    <div class="label-container"><i class="fas fa-ruler-vertical"></i><label>Height (cm) <span class="required-dot">*</span></label></div>
                    <div class="input-wrapper">
                        <input type="number" name="height" step="0.1" placeholder="Height in cm" required>
                        <i class="fas fa-arrows-alt-v"></i>
                    </div>
                </div>
                <div class="form-group">
                    <div class="label-container"><i class="fas fa-weight"></i><label>Current Weight (kg) <span class="required-dot">*</span></label></div>
                    <div class="input-wrapper">
                        <input type="number" name="weight" step="0.1" placeholder="Weight in kg" required>
                        <i class="fas fa-balance-scale"></i>
                    </div>
                </div>
                <div class="form-group">
                    <div class="label-container"><i class="fas fa-tint"></i><label>Blood Pressure <span class="required-dot">*</span></label></div>
                    <div class="input-wrapper">
                        <input type="text" name="bp" placeholder="e.g. 120/80" required>
                        <i class="fas fa-heartbeat"></i>
                    </div>
                </div>
                <div class="form-group">
                    <div class="label-container"><i class="fas fa-utensils"></i><label>Dietary Preference <span class="required-dot">*</span></label></div>
                    <div class="input-wrapper">
                        <select name="dietary" required>
                            <option value="Non-Veg">Non-Vegetarian</option>
                            <option value="Veg">Vegetarian</option>
                            <option value="Vegan">Vegan</option>
                            <option value="Eggetarian">Eggetarian</option>
                        </select>
                        <i class="fas fa-leaf"></i>
                    </div>
                </div>
                <div class="form-group">
                    <div class="label-container"><i class="fas fa-clock"></i><label>Meal Frequency <span class="required-dot">*</span></label></div>
                    <div class="input-wrapper">
                        <select name="plan_type" required>
                            <option value="">Select Meal Type</option>
                            <option value="3-Meal">3 Meals (Std)</option>
                            <option value="4-Meal">4 Meals (Small Intervals)</option>
                        </select>
                        <i class="fas fa-concierge-bell"></i>
                    </div>
                </div>
                <div class="form-group">
                    <div class="label-container"><i class="fas fa-running"></i><label>Physical Activity <span class="required-dot">*</span></label></div>
                    <div class="input-wrapper">
                        <select name="activity" required>
                            <option value="">Select Activity Type</option>
                            <option value="1.2">Sedentary (No exercise)</option>
                            <option value="1.375">Light (1-3 days/week)</option>
                            <option value="1.55">Moderate (3-5 days/week)</option>
                            <option value="1.725">Very Active (Daily)</option>
                        </select>
                        <i class="fas fa-fire"></i>
                    </div>
                </div>
                <div class="form-group full-width" style="margin-top:20px; position:relative;">
                    <div class="label-container" style="margin-bottom:10px;">
                        <i class="fas fa-stethoscope"></i>
                        <label>Medical Conditions <span
                                style="font-weight:400;color:var(--text-muted);font-size:12px;text-transform:none;letter-spacing:0;">—
                                type to search &amp; add</span></label>
                    </div>
                    <input type="hidden" name="diseases" id="diseasesHidden" value="">
                    <div id="diseaseTagBox" onclick="document.getElementById('diseaseSearch').focus()">
                        <input id="diseaseSearch" type="text" placeholder="Type to select" autocomplete="off">
                    </div>
                    <div id="diseaseCount"
                        style="display:none;margin-top:6px;font-size:12px;color:var(--brand);font-weight:600;">
                        <i class="fas fa-check-circle"></i> <span id="diseaseCountNum">0</span> condition(s) selected
                    </div>
                    <div id="diseaseDrop"></div>
                </div>
            </div>
            <button type="submit" class="submit-button">
                <i class="fas fa-calculator"></i>
                <span>Analyze Vitals &amp; Generate Plan</span>
            </button>
        </form>
    </div>
</div>

<script>
    (function () {
        var ALL_DISEASES = {{ all_diseases_json|safe }};
    var selected = [];
    var inp = document.getElementById('diseaseSearch');
    var drop = document.getElementById('diseaseDrop');
    var tagBox = document.getElementById('diseaseTagBox');
    var hidden = document.getElementById('diseasesHidden');
    var cntWrap = document.getElementById('diseaseCount');
    var cntNum = document.getElementById('diseaseCountNum');
    var phoneInput = document.getElementById('phoneInput');
    var form = document.querySelector('form');

    form.addEventListener('submit', function (e) {
        if (phoneInput && phoneInput.value.length !== 10) {
            e.preventDefault();
            alert("Invalid contact details");
            phoneInput.focus();
            return false;
        }
    });
    var activeIdx = -1;

    function syncHidden() {
        hidden.value = selected.join(',');
        if (selected.length > 0) { cntWrap.style.display = 'block'; cntNum.textContent = selected.length; }
        else { cntWrap.style.display = 'none'; }
    }

    function addTag(name) {
        if (!name || selected.indexOf(name) !== -1) return;
        selected.push(name);
        var tag = document.createElement('span'); tag.className = 'dtag';
        var txt = document.createElement('span'); txt.textContent = name;
        var btn = document.createElement('button'); btn.className = 'dtag-remove'; btn.type = 'button'; btn.title = 'Remove'; btn.innerHTML = '&times;';
        btn.onclick = function () { tag.remove(); selected = selected.filter(function (s) { return s !== name; }); syncHidden(); };
        tag.appendChild(txt); tag.appendChild(btn); tagBox.insertBefore(tag, inp); syncHidden();
    }

    function highlight(text, q) {
        var idx = text.toLowerCase().indexOf(q.toLowerCase());
        if (idx < 0) return document.createTextNode(text);
        var frag = document.createDocumentFragment();
        frag.appendChild(document.createTextNode(text.slice(0, idx)));
        var mark = document.createElement('mark'); mark.textContent = text.slice(idx, idx + q.length);
        frag.appendChild(mark); frag.appendChild(document.createTextNode(text.slice(idx + q.length))); return frag;
    }

    function positionDrop() {
        var rect = tagBox.getBoundingClientRect();
        drop.style.top = (rect.bottom + 4) + 'px'; drop.style.left = rect.left + 'px'; drop.style.width = rect.width + 'px';
    }

    function showDrop(q) {
        drop.innerHTML = ''; activeIdx = -1;
        var matches = ALL_DISEASES.filter(function (d) { return d.toLowerCase().indexOf(q.toLowerCase()) !== -1 && selected.indexOf(d) === -1; }).slice(0, 35);
        if (!q.trim()) { drop.style.display = 'none'; return; }
        if (matches.length === 0) {
            var empty = document.createElement('div'); empty.className = 'dsug-empty'; empty.textContent = 'No matching disease found.'; drop.appendChild(empty);
        } else {
            matches.forEach(function (d) {
                var item = document.createElement('div'); item.className = 'dsug-item'; item.appendChild(highlight(d, q));
                item.onmousedown = function (e) { e.preventDefault(); addTag(d); inp.value = ''; drop.style.display = 'none'; inp.focus(); };
                drop.appendChild(item);
            });
        }
        positionDrop(); drop.style.display = 'block';
    }

    function setActive(idx) {
        var items = drop.querySelectorAll('.dsug-item');
        items.forEach(function (el, i) { el.classList.toggle('active', i === idx); });
        if (items[idx]) items[idx].scrollIntoView({ block: 'nearest' });
    }

    inp.addEventListener('input', function () { showDrop(this.value); });
    inp.addEventListener('focus', function () { if (this.value) showDrop(this.value); });
    inp.addEventListener('keydown', function (e) {
        var items = drop.querySelectorAll('.dsug-item');
        if (e.key === 'ArrowDown') { e.preventDefault(); activeIdx = Math.min(activeIdx + 1, items.length - 1); setActive(activeIdx); }
        else if (e.key === 'ArrowUp') { e.preventDefault(); activeIdx = Math.max(activeIdx - 1, 0); setActive(activeIdx); }
        else if (e.key === 'Enter') { e.preventDefault(); if (activeIdx >= 0 && items[activeIdx]) { addTag(items[activeIdx].textContent); inp.value = ''; drop.style.display = 'none'; } }
        else if (e.key === 'Escape') { drop.style.display = 'none'; }
        else if (e.key === 'Backspace' && !inp.value && selected.length) { var last = tagBox.querySelector('.dtag:last-of-type'); if (last) { last.remove(); selected = selected.slice(0, -1); syncHidden(); } }
    });
    document.addEventListener('click', function (e) { if (!tagBox.contains(e.target) && !drop.contains(e.target)) drop.style.display = 'none'; });
    window.addEventListener('scroll', function () { if (drop.style.display === 'block') positionDrop(); }, true);
    window.addEventListener('resize', function () { if (drop.style.display === 'block') positionDrop(); });
})();
</script>
{% endblock %}
