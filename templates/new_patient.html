{% extends 'base.html' %}
{% load static %}

{% block content %}
<style>
    :root {
        --hospital-primary: #0891b2;
        --hospital-secondary: #06b6d4;
        --hospital-accent: #22d3ee;
        --hospital-success: #10b981;
        --hospital-dark: #0f172a;
        --hospital-light: #f8fafc;
        --glass-bg: rgba(255, 255, 255, 0.95);
    }

    /* --- Page Container & Layout --- */
    .registration-wrapper {
        max-width: 900px;
        margin: 0 auto;
        padding-bottom: 50px;
        animation: fadeIn 0.8s ease-out;
    }

    @keyframes fadeIn {
        from {
            opacity: 0;
            transform: translateY(20px);
        }

        to {
            opacity: 1;
            transform: translateY(0);
        }
    }

    /* --- Premium Header Section --- */
    .form-header {
        background: linear-gradient(135deg, #0c4a6e 0%, #0891b2 50%, #06b6d4 100%);
        color: white;
        border-radius: 20px 20px 0 0;
        padding: 40px;
        text-align: center;
        position: relative;
        overflow: hidden;
        box-shadow: 0 10px 30px rgba(8, 145, 178, 0.2);
    }

    .form-header::before {
        content: '+';
        position: absolute;
        top: -20px;
        right: 5%;
        font-size: 150px;
        color: rgba(255, 255, 255, 0.05);
        font-weight: 100;
        animation: rotateCross 20s linear infinite;
    }

    @keyframes rotateCross {
        from {
            transform: rotate(0deg);
        }

        to {
            transform: rotate(360deg);
        }
    }

    .form-header h2 {
        font-size: 32px;
        font-weight: 800;
        margin-bottom: 10px;
        letter-spacing: -0.5px;
    }

    .form-header p {
        opacity: 0.9;
        font-weight: 300;
        font-size: 16px;
    }

    /* --- Form Container (Glassmorphism) --- */
    .form-container {
        background: var(--glass-bg);
        padding: 50px;
        border-radius: 0 0 20px 20px;
        box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.1);
        border: 1px solid rgba(255, 255, 255, 0.3);
        position: relative;
    }

    /* --- Back Button --- */
    .back-nav {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        color: var(--hospital-primary);
        text-decoration: none;
        font-weight: 600;
        font-size: 14px;
        margin-bottom: 25px;
        padding: 8px 16px;
        background: #f1f5f9;
        border-radius: 12px;
        transition: all 0.3s ease;
    }

    .back-nav:hover {
        background: var(--hospital-primary);
        color: white;
        transform: translateX(-5px);
    }

    /* --- Form Elements --- */
    .form-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 25px;
    }

    .form-group {
        margin-bottom: 5px;
    }

    .form-group.full-width {
        grid-column: span 2;
    }

    .label-container {
        display: flex;
        align-items: center;
        gap: 8px;
        margin-bottom: 8px;
    }

    .label-container i {
        color: var(--hospital-primary);
        font-size: 14px;
    }

    label {
        font-size: 13px;
        font-weight: 700;
        color: #475569;
        text-transform: uppercase;
        letter-spacing: 0.5px;
    }

    .input-wrapper {
        position: relative;
    }

    .input-wrapper i {
        position: absolute;
        left: 15px;
        top: 50%;
        transform: translateY(-50%);
        color: #94a3b8;
        font-size: 16px;
        transition: all 0.3s ease;
    }

    input,
    select,
    textarea {
        width: 100%;
        padding: 14px 15px 14px 45px;
        border: 2px solid #e2e8f0;
        border-radius: 12px;
        font-size: 15px;
        background: #f8fafc;
        color: #1e293b;
        transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        font-family: 'Inter', sans-serif;
    }

    textarea {
        padding-left: 15px;
        /* Address textarea doesn't need left icon as much, but let's be consistent if we add one */
    }

    input:focus,
    select:focus,
    textarea:focus {
        border-color: var(--hospital-primary);
        background: white;
        outline: none;
        box-shadow: 0 0 0 4px rgba(8, 145, 178, 0.1);
        transform: translateY(-2px);
    }

    input:focus~i,
    select:focus~i {
        color: var(--hospital-primary);
    }

    /* --- Submit Button --- */
    .submit-button {
        width: 100%;
        padding: 18px;
        background: linear-gradient(135deg, #10b981 0%, #059669 100%);
        color: white;
        border: none;
        border-radius: 14px;
        font-size: 18px;
        font-weight: 700;
        cursor: pointer;
        transition: all 0.3s ease;
        margin-top: 30px;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 12px;
        box-shadow: 0 10px 25px rgba(16, 185, 129, 0.2);
    }

    .submit-button:hover {
        transform: translateY(-3px);
        box-shadow: 0 15px 35px rgba(16, 185, 129, 0.3);
        background: linear-gradient(135deg, #059669 0%, #047857 100%);
    }

    .submit-button i {
        font-size: 20px;
    }

    /* --- Responsive --- */
    @media (max-width: 768px) {
        .form-grid {
            grid-template-columns: 1fr;
        }

        .form-group.full-width {
            grid-column: span 1;
        }

        .form-container {
            padding: 30px 20px;
        }

        .form-header {
            padding: 30px 20px;
        }
    }
</style>

<div class="registration-wrapper">
    <!-- Back Navigation -->
    <a href="{% url 'home' %}" class="back-nav">
        <i class="fas fa-arrow-left"></i>
        <span>Back to Dashboard</span>
    </a>

    <!-- Premium Header -->
    <div class="form-header">
        <h2>🏥 Patient Registration</h2>
        <p>Complete the clinical profile to generate a precision diet plan</p>
    </div>

    <!-- Form Container -->
    <div class="form-container">
        <form method="post">
            {% csrf_token %}

            <div class="form-grid">
                <!-- Row 1 -->
                <div class="form-group">
                    <div class="label-container">
                        <i class="fas fa-user"></i>
                        <label>Patient Full Name</label>
                    </div>
                    <div class="input-wrapper">
                        <input type="text" name="name" placeholder="John Doe" required>
                        <i class="fas fa-id-card"></i>
                    </div>
                </div>

                <div class="form-group">
                    <div class="label-container">
                        <i class="fas fa-phone"></i>
                        <label>Contact Number</label>
                    </div>
                    <div class="input-wrapper">
                        <input type="tel" name="phone" pattern="[0-9]{10}" placeholder="9876543210" required>
                        <i class="fas fa-mobile-alt"></i>
                    </div>
                </div>

                <!-- Row 2 -->
                <div class="form-group">
                    <div class="label-container">
                        <i class="fas fa-birthday-cake"></i>
                        <label>Patient Age</label>
                    </div>
                    <div class="input-wrapper">
                        <input type="number" name="age" placeholder="Age in years" required>
                        <i class="fas fa-calendar-alt"></i>
                    </div>
                </div>

                <div class="form-group">
                    <div class="label-container">
                        <i class="fas fa-venus-mars"></i>
                        <label>Gender</label>
                    </div>
                    <div class="input-wrapper">
                        <select name="gender" required>
                            <option value="">Select Gender</option>
                            <option value="Male">Male</option>
                            <option value="Female">Female</option>
                        </select>
                        <i class="fas fa-caret-down"></i>
                    </div>
                </div>

                <!-- Row 3 (Full Width) -->
                <div class="form-group full-width">
                    <div class="label-container">
                        <i class="fas fa-map-marker-alt"></i>
                        <label>Residential Address</label>
                    </div>
                    <textarea name="address" rows="2" placeholder="Street, City, State, Zip Code" required></textarea>
                </div>

                <!-- Row 4 -->
                <div class="form-group">
                    <div class="label-container">
                        <i class="fas fa-ruler-vertical"></i>
                        <label>Height (cm)</label>
                    </div>
                    <div class="input-wrapper">
                        <input type="number" name="height" step="0.1" placeholder="e.g. 175" required>
                        <i class="fas fa-arrows-alt-v"></i>
                    </div>
                </div>

                <div class="form-group">
                    <div class="label-container">
                        <i class="fas fa-weight"></i>
                        <label>Current Weight (kg)</label>
                    </div>
                    <div class="input-wrapper">
                        <input type="number" name="weight" step="0.1" placeholder="e.g. 70.5" required>
                        <i class="fas fa-balance-scale"></i>
                    </div>
                </div>

                <!-- Row 5 -->
                <div class="form-group">
                    <div class="label-container">
                        <i class="fas fa-tint"></i>
                        <label>Blood Pressure</label>
                    </div>
                    <div class="input-wrapper">
                        <input type="text" name="bp" placeholder="e.g. 120/80" required>
                        <i class="fas fa-heartbeat"></i>
                    </div>
                </div>

                <div class="form-group">
                    <div class="label-container">
                        <i class="fas fa-utensils"></i>
                        <label>Dietary Preference</label>
                    </div>
                    <div class="input-wrapper">
                        <select name="dietary" required>
                            <option value="Non-Veg">Non-Vegetarian</option>
                            <option value="Veg">Vegetarian</option>
                            <option value="Vegan">Vegan</option>
                            <option value="Eggetarian">Eggetarian</option>
                        </select>
                        <i class="fas fa-leaf"></i>
                    </div>
                </div>

                <!-- Row 6 -->
                <div class="form-group">
                    <div class="label-container">
                        <i class="fas fa-clock"></i>
                        <label>Meal Frequency</label>
                    </div>
                    <div class="input-wrapper">
                        <select name="plan_type" required>
                            <option value="3-Meal">3 Meals (Std)</option>
                            <option value="5-Meal">5 Meals (Small Intervals)</option>
                        </select>
                        <i class="fas fa-concierge-bell"></i>
                    </div>
                </div>

                <div class="form-group">
                    <div class="label-container">
                        <i class="fas fa-running"></i>
                        <label>Physical Activity</label>
                    </div>
                    <div class="input-wrapper">
                        <select name="activity" required>
                            <option value="1.2">Sedentary (No exercise)</option>
                            <option value="1.375">Light (1-3 days/week)</option>
                            <option value="1.55">Moderate (3-5 days/week)</option>
                            <option value="1.725">Very Active (Daily)</option>
                        </select>
                        <i class="fas fa-fire"></i>
                    </div>
                </div>

                <!-- ============================================================
                     DISEASE MULTI-SELECTOR — Fixed & Polished
                     ============================================================ -->
                <div class="form-group full-width" style="margin-top: 20px; position: relative;">

                    <div class="label-container" style="margin-bottom: 10px;">
                        <i class="fas fa-stethoscope"></i>
                        <label>
                            Medical Conditions
                            <span style="font-weight:400; color:#64748b; font-size:13px;">
                                — type to search &amp; add (supports multiple)
                            </span>
                        </label>
                    </div>

                    <!-- Hidden field submitted to backend -->
                    <input type="hidden" name="diseases" id="diseasesHidden" value="">

                    <!-- Tag input box -->
                    <div id="diseaseTagBox" onclick="document.getElementById('diseaseSearch').focus()">
                        <!-- Tags injected here by JS -->
                        <input id="diseaseSearch" type="text" placeholder="e.g. Diabetes, Hypertension, Arthritis…"
                            autocomplete="off">
                    </div>

                    <!-- Count badge -->
                    <div id="diseaseCount"
                        style="display:none; margin-top:6px; font-size:12px; color:#0891b2; font-weight:600;">
                        <i class="fas fa-check-circle"></i> <span id="diseaseCountNum">0</span> condition(s) selected
                    </div>

                    <!-- Autocomplete dropdown — fixed position via JS -->
                    <div id="diseaseDrop"></div>

                </div><!-- end disease group -->

                <style>
                    /* ---- Tag Input Box ---- */
                    #diseaseTagBox {
                        min-height: 56px;
                        background: #f8fafc;
                        border: 2px solid #e2e8f0;
                        border-radius: 14px;
                        padding: 10px 14px;
                        display: flex;
                        flex-wrap: wrap;
                        gap: 8px;
                        align-items: center;
                        cursor: text;
                        transition: border-color .2s, box-shadow .2s;
                    }

                    #diseaseTagBox:focus-within {
                        border-color: #0891b2;
                        box-shadow: 0 0 0 3px rgba(8, 145, 178, .15);
                    }

                    #diseaseSearch {
                        border: none;
                        outline: none;
                        background: transparent;
                        font-size: 14px;
                        font-family: inherit;
                        min-width: 220px;
                        flex: 1;
                        color: #0f172a;
                    }

                    #diseaseSearch::placeholder {
                        color: #94a3b8;
                    }

                    /* ---- Tags ---- */
                    .dtag {
                        display: inline-flex;
                        align-items: center;
                        gap: 5px;
                        background: linear-gradient(135deg, #0891b2 0%, #0c4a6e 100%);
                        color: #fff;
                        border-radius: 999px;
                        padding: 5px 14px 5px 12px;
                        font-size: 13px;
                        font-weight: 600;
                        white-space: nowrap;
                        animation: tagPop .18s cubic-bezier(.175, .885, .32, 1.275) both;
                    }

                    @keyframes tagPop {
                        from {
                            transform: scale(0.7);
                            opacity: 0;
                        }

                        to {
                            transform: scale(1);
                            opacity: 1;
                        }
                    }

                    .dtag-remove {
                        background: rgba(255, 255, 255, .25);
                        border: none;
                        color: #fff;
                        width: 18px;
                        height: 18px;
                        border-radius: 50%;
                        font-size: 13px;
                        line-height: 1;
                        cursor: pointer;
                        display: flex;
                        align-items: center;
                        justify-content: center;
                        flex-shrink: 0;
                        transition: background .15s;
                        padding: 0;
                        font-family: inherit;
                    }

                    .dtag-remove:hover {
                        background: rgba(255, 255, 255, .45);
                    }

                    /* ---- Dropdown ---- */
                    #diseaseDrop {
                        position: fixed;
                        z-index: 99999;
                        background: #fff;
                        border: 1.5px solid #e2e8f0;
                        border-radius: 14px;
                        max-height: 240px;
                        overflow-y: auto;
                        box-shadow: 0 12px 36px rgba(0, 0, 0, .14);
                        display: none;
                        font-size: 14px;
                        scrollbar-width: thin;
                    }

                    .dsug-item {
                        padding: 11px 18px;
                        cursor: pointer;
                        transition: background .12s;
                        border-bottom: 1px solid #f1f5f9;
                        color: #1e293b;
                    }

                    .dsug-item:last-child {
                        border-bottom: none;
                    }

                    .dsug-item:hover,
                    .dsug-item.active {
                        background: #f0f9ff;
                        color: #0c4a6e;
                        font-weight: 600;
                    }

                    .dsug-item mark {
                        background: #bae6fd;
                        color: #0c4a6e;
                        border-radius: 3px;
                        padding: 0 2px;
                        font-weight: 700;
                    }

                    .dsug-empty {
                        padding: 14px 18px;
                        color: #94a3b8;
                        font-style: italic;
                        text-align: center;
                    }
                </style>

                <script>
                    (function () {
                        var ALL_DISEASES = {{ all_diseases_json|safe }};
                    var selected = [];

                    var inp = document.getElementById('diseaseSearch');
                    var drop = document.getElementById('diseaseDrop');
                    var tagBox = document.getElementById('diseaseTagBox');
                    var hidden = document.getElementById('diseasesHidden');
                    var cntWrap = document.getElementById('diseaseCount');
                    var cntNum = document.getElementById('diseaseCountNum');
                    var activeIdx = -1;

                    /* ---- Sync hidden field ---- */
                    function syncHidden() {
                        hidden.value = selected.join(',');
                        if (selected.length > 0) {
                            cntWrap.style.display = 'block';
                            cntNum.textContent = selected.length;
                        } else {
                            cntWrap.style.display = 'none';
                        }
                    }

                    /* ---- Add a tag ---- */
                    function addTag(name) {
                        if (!name || selected.indexOf(name) !== -1) return;
                        selected.push(name);

                        var tag = document.createElement('span');
                        tag.className = 'dtag';

                        var txt = document.createElement('span');
                        txt.textContent = name;

                        var btn = document.createElement('button');
                        btn.className = 'dtag-remove';
                        btn.type = 'button';
                        btn.title = 'Remove';
                        btn.innerHTML = '&times;';
                        btn.onclick = function () {
                            tag.remove();
                            selected = selected.filter(function (s) { return s !== name; });
                            syncHidden();
                        };

                        tag.appendChild(txt);
                        tag.appendChild(btn);
                        tagBox.insertBefore(tag, inp);
                        syncHidden();
                    }

                    /* ---- Highlight matching part ---- */
                    function highlight(text, q) {
                        var idx = text.toLowerCase().indexOf(q.toLowerCase());
                        if (idx < 0) return document.createTextNode(text);
                        var frag = document.createDocumentFragment();
                        frag.appendChild(document.createTextNode(text.slice(0, idx)));
                        var mark = document.createElement('mark');
                        mark.textContent = text.slice(idx, idx + q.length);
                        frag.appendChild(mark);
                        frag.appendChild(document.createTextNode(text.slice(idx + q.length)));
                        return frag;
                    }

                    /* ---- Position dropdown under input box ---- */
                    function positionDrop() {
                        var rect = tagBox.getBoundingClientRect();
                        drop.style.top = (rect.bottom + 4) + 'px';
                        drop.style.left = rect.left + 'px';
                        drop.style.width = rect.width + 'px';
                    }

                    /* ---- Show suggestions ---- */
                    function showDrop(q) {
                        drop.innerHTML = '';
                        activeIdx = -1;

                        var matches = ALL_DISEASES.filter(function (d) {
                            return d.toLowerCase().indexOf(q.toLowerCase()) !== -1
                                && selected.indexOf(d) === -1;   // hide already-selected
                        }).slice(0, 35);

                        if (!q.trim()) { drop.style.display = 'none'; return; }

                        if (matches.length === 0) {
                            var empty = document.createElement('div');
                            empty.className = 'dsug-empty';
                            empty.textContent = 'No matching disease found.';
                            drop.appendChild(empty);
                        } else {
                            matches.forEach(function (d) {
                                var item = document.createElement('div');
                                item.className = 'dsug-item';
                                item.appendChild(highlight(d, q));
                                item.onmousedown = function (e) {
                                    e.preventDefault();
                                    addTag(d);
                                    inp.value = '';
                                    drop.style.display = 'none';
                                    inp.focus();
                                };
                                drop.appendChild(item);
                            });
                        }

                        positionDrop();
                        drop.style.display = 'block';
                    }

                    /* ---- Set active item in drop ---- */
                    function setActive(idx) {
                        var items = drop.querySelectorAll('.dsug-item');
                        items.forEach(function (el, i) { el.classList.toggle('active', i === idx); });
                        if (items[idx]) items[idx].scrollIntoView({ block: 'nearest' });
                    }

                    /* ---- Events ---- */
                    inp.addEventListener('input', function () { showDrop(this.value); });
                    inp.addEventListener('focus', function () { if (this.value) showDrop(this.value); });

                    inp.addEventListener('keydown', function (e) {
                        var items = drop.querySelectorAll('.dsug-item');
                        if (e.key === 'ArrowDown') {
                            e.preventDefault();
                            activeIdx = Math.min(activeIdx + 1, items.length - 1);
                            setActive(activeIdx);
                        } else if (e.key === 'ArrowUp') {
                            e.preventDefault();
                            activeIdx = Math.max(activeIdx - 1, 0);
                            setActive(activeIdx);
                        } else if (e.key === 'Enter') {
                            e.preventDefault();
                            if (activeIdx >= 0 && items[activeIdx]) {
                                addTag(items[activeIdx].textContent);
                                inp.value = '';
                                drop.style.display = 'none';
                            }
                        } else if (e.key === 'Escape') {
                            drop.style.display = 'none';
                        } else if (e.key === 'Backspace' && !inp.value && selected.length) {
                            // Remove last tag on backspace
                            var lastTag = tagBox.querySelector('.dtag:last-of-type');
                            if (lastTag) {
                                var lastName = selected[selected.length - 1];
                                lastTag.remove();
                                selected = selected.slice(0, -1);
                                syncHidden();
                            }
                        }
                    });

                    document.addEventListener('click', function (e) {
                        if (!tagBox.contains(e.target) && !drop.contains(e.target)) {
                            drop.style.display = 'none';
                        }
                    });

                    window.addEventListener('scroll', function () {
                        if (drop.style.display === 'block') positionDrop();
                    }, true);

                    window.addEventListener('resize', function () {
                        if (drop.style.display === 'block') positionDrop();
                    });
                }) ();
                </script>

            </div>

            <!-- Submit Action -->
            <button type="submit" class="submit-button">
                <i class="fas fa-calculator"></i>
                <span>Analyze Vitals & Generate Plan</span>
            </button>
        </form>
    </div>
</div>
{% endblock %}
